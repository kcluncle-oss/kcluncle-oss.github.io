<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>命運解碼室 - 靈魂契約</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --bg-deep: #050508;
            --bg-accent: #1a1b3a;
            --gold: #D4AF37;
            --gold-light: #F9E498;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --text-main: #FFFFFF;
            --text-sub: #a0a0a0;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-deep); color: var(--text-main);
            font-family: 'PingFang TC', 'Heiti TC', sans-serif; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* 🌌 沉浸式星空背景 */
        .universe-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--bg-accent) 0%, var(--bg-deep) 100%);
            z-index: -1;
        }
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 200%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3; animation: drift 60s linear infinite; z-index: -1;
        }
        @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-50%); } }

        /* ==========================================
            🏛️ 畫面一：前導大廳 (神秘感強化)
           ========================================== */
        #lobby {
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 50; 
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        #lobby.hidden { opacity: 0; transform: scale(1.1); pointer-events: none; }

        .lobby-title { 
            color: var(--gold); font-size: 32px; font-weight: 900; letter-spacing: 6px; 
            margin-bottom: 40px; text-shadow: 0 0 20px var(--gold-glow); 
        }
        
        .topic-btn {
            background: rgba(255, 255, 255, 0.05); border: 1.5px solid var(--gold); 
            color: var(--gold-light); width: 85%; max-width: 320px; padding: 22px; 
            margin: 12px 0; border-radius: 50px; font-size: 18px; font-weight: bold; 
            letter-spacing: 3px; cursor: pointer; transition: all 0.4s;
            backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .topic-btn:active { background: var(--gold); color: #000; transform: scale(0.95); }

        /* ==========================================
            🃏 畫面二：神聖牌陣 (3D 翻牌強化)
           ========================================== */
        #tarot-room {
            width: 100%; display: flex; flex-direction: column; align-items: center;
            opacity: 0; transform: translateY(30px); transition: 0.8s ease 0.3s;
            pointer-events: none; position: absolute; top: 0; padding-top: 30px;
        }
        #tarot-room.active { opacity: 1; transform: translateY(0); pointer-events: auto; position: relative; }

        /* 3D 卡片結構 (下方選牌區) */
        .card-container {
            perspective: 1000px; min-width: 90px; height: 145px; margin: 0 -10px;
            scroll-snap-align: center; transition: transform 0.3s, opacity 0.3s;
        }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        
        .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            background: #1a1a1a;
            background-image: radial-gradient(var(--gold) 1px, transparent 1px);
            background-size: 12px 12px;
        }

        /* 聚焦效果：第一下點擊卡片浮起與發光 */
        .card-container.focused { transform: translateY(-20px) scale(1.15); z-index: 10; }
        .card-container.focused .card-back { border-color: var(--gold); box-shadow: 0 0 25px var(--gold-glow); }

        /* 選牌格位 (上方牌陣) */
        .slot {
            width: 85px; height: 130px; border: 1.5px dashed #444; border-radius: 10px;
            position: relative; transition: 0.4s;
        }

        /* ==========================================
           ✨ 能量爆發與持續閃爍動畫 (核心打擊感)
           ========================================== */
        @keyframes impact-flash {
            0% { box-shadow: 0 0 0px #fff, 0 0 0px var(--gold); background: transparent; }
            40% { box-shadow: 0 0 50px #fff, 0 0 80px var(--gold); background: rgba(255, 255, 255, 0.9); border-color: #fff; }
            100% { box-shadow: 0 0 20px var(--gold); background: rgba(212, 175, 55, 0.1); border-color: var(--gold); }
        }

        @keyframes energy-shimmer {
            0%, 100% { box-shadow: 0 0 10px var(--gold-glow); border-color: rgba(212, 175, 55, 0.4); }
            50% { box-shadow: 0 0 30px var(--gold), inset 0 0 15px rgba(255,255,255,0.1); border-color: var(--gold-light); }
        }

        @keyframes card-drop-in {
            0% { transform: translateY(-60px) scale(1.3) rotateX(30deg); opacity: 0; }
            100% { transform: translateY(0) scale(1) rotateX(0); opacity: 1; }
        }

        /* 觸發類別 */
        .slot.impact { animation: impact-flash 0.4s ease-out forwards; border-style: solid; }
        .slot.shimmering { animation: energy-shimmer 2.5s ease-in-out infinite; border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.1); }
        .drop-in-anim { animation: card-drop-in 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }

        /* 結算按鈕 */
        #submitBtn {
            margin-top: 30px; background: var(--gold); color: #000; border: none; 
            padding: 15px 50px; border-radius: 50px; font-weight: bold; font-size: 18px; 
            opacity: 0; pointer-events: none; transition: 0.5s; 
            box-shadow: 0 0 20px var(--gold-glow);
        }
        #submitBtn.active {
            opacity: 1; pointer-events: auto;
            animation: btn-pulse 2s infinite;
        }
        @keyframes btn-pulse { 0%, 100% { box-shadow: 0 0 15px var(--gold-glow); transform: scale(1); } 50% { box-shadow: 0 0 30px var(--gold); transform: scale(1.05); } }

        /* ==========================================
            🚫 餘額不足彈窗
           ========================================== */
        #balance-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 1000; backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #1a1a1a; border: 2px solid var(--gold); padding: 40px;
            border-radius: 20px; text-align: center; max-width: 80%; box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="universe-bg"></div>
    <div class="stars"></div>

    <div id="lobby">
        <div class="lobby-title">命運解碼室</div>
        <p style="color: var(--text-sub); font-size: 14px; margin-bottom: 30px; letter-spacing: 2px;">請凝神選擇欲指引的領域</p>
        <button class="topic-btn" data-topic="感情">💖 感情與糾葛</button>
        <button class="topic-btn" data-topic="事業">💼 事業與財富</button>
        <button class="topic-btn" data-topic="綜合">🌟 綜合與指引</button>
    </div>

    <div id="tarot-room">
        <div class="header" style="margin-bottom: 20px; text-align: center;">
            <div id="room-title" style="color: var(--gold); font-size: 22px; font-weight: bold; letter-spacing: 3px;">專屬測算</div>
            <div id="instruction" style="font-size: 14px; margin-top: 8px; color: #fff; height: 20px; transition: 0.3s;">請在此空間感受您的能量</div>
        </div>

        <div class="slots-container" style="display: flex; gap: 15px; margin-bottom: 40px;">
            <div class="slot" id="slot-0"><div style="position:absolute; bottom:-25px; width:100%; text-align:center; font-size:12px; color:#666;">過去</div></div>
            <div class="slot" id="slot-1"><div style="position:absolute; bottom:-25px; width:100%; text-align:center; font-size:12px; color:#666;">現在</div></div>
            <div class="slot" id="slot-2"><div style="position:absolute; bottom:-25px; width:100%; text-align:center; font-size:12px; color:#666;">未來</div></div>
        </div>

        <div class="deck-wrapper" style="width: 100%; overflow-x: auto; padding: 40px 0; scroll-behavior: smooth;">
            <div class="deck" id="deck" style="display: inline-flex; padding: 0 45%; gap: 5px;"></div>
        </div>

        <button id="submitBtn">解開命運結界</button>
    </div>

    <div class="overlay" id="loadingOverlay" style="position: fixed; inset: 0; background: rgba(5,5,8,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 999; backdrop-filter: blur(5px);">
        <div class="hexagram" style="width: 120px; height: 120px; animation: spin 4s linear infinite;">
            <svg viewBox="0 0 100 100" style="stroke: var(--gold); fill: none; stroke-width: 2; filter: drop-shadow(0 0 10px var(--gold));">
                <polygon points="50,5 90,75 10,75" /><polygon points="50,95 90,25 10,25" />
            </svg>
        </div>
        <p style="color: var(--gold); margin-top: 30px; letter-spacing: 2px; text-align: center; line-height: 1.8; animation: blink 1.5s infinite;">正在調頻宇宙訊息...<br>請保持呼吸平穩</p>
        <style>@keyframes spin { 100% { transform: rotate(360deg); } } @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }</style>
    </div>

    <div id="balance-modal">
        <div class="modal-content">
            <h2 style="color: var(--gold); margin-top: 0;">🔮 能量不足</h2>
            <p style="color: #ccc; font-size: 14px; line-height: 1.6;">本次靈魂測算需 10 點能量。<br>您目前的點數不足，請先充能。</p>
            <button onclick="liff.closeWindow()" style="background: var(--gold); border:none; padding: 12px 30px; border-radius: 50px; font-weight: bold; margin-top: 20px; cursor: pointer;">返回聊天室</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 🚀 1. LIFF 初始化與餘額檢查防護網
        // ==========================================
        const LIFF_ID = "2009490171-yQF5PguK";
        
        // ⚠️ 這裡預設給 100 方便你測試前端動畫。
        // 未來串接 API 時，這裡要改成 fetch 後端取得真實點數。
        let userPoints = 100; 

        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn() && !liff.isInClient()) {
                    liff.login();
                }
                
                // 【防呆漏斗】：一進來就檢查，沒錢直接擋掉，不給抽牌
                if (userPoints < 10) {
                    document.getElementById('balance-modal').style.display = 'flex';
                }
            } catch (err) { console.error('LIFF 初始化失敗:', err); }
        }
        initializeLiff();

        // ==========================================
        // 🎭 2. 轉場邏輯：選擇主題
        // ==========================================
        let currentTopic = "";
        document.querySelectorAll('.topic-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                // 二次防護，就算按鈕透過去也點不了
                if (userPoints < 10) return; 
                
                currentTopic = e.target.dataset.topic;
                document.getElementById('room-title').innerText = `【${currentTopic}】專屬測算`;
                
                document.getElementById('lobby').classList.add('hidden');
                document.getElementById('tarot-room').classList.add('active');
            });
        });

        // ==========================================
        // 🃏 3. 高張力抽牌邏輯 (聚焦 ➔ 爆發 ➔ 降落 ➔ 閃爍)
        // ==========================================
        const deck = document.getElementById('deck');
        const majorArcana = ["愚者", "魔術師", "女祭司", "女皇", "皇帝", "教皇", "戀人", "戰車", "力量", "隱士", "命運之輪", "正義", "倒吊人", "死神", "節制", "惡魔", "高塔", "星星", "月亮", "太陽", "審判", "世界"];
        const shuffled = majorArcana.sort(() => 0.5 - Math.random());
        
        let drawnCount = 0;
        let selectedCards = [];
        let focusedContainer = null;

        for (let i = 0; i < 22; i++) {
            const container = document.createElement('div');
            container.className = 'card-container';
            container.innerHTML = `
                <div class="card-inner">
                    <div class="card-back"></div>
                </div>
            `;

            container.addEventListener('click', () => {
                if (drawnCount >= 3 || container.classList.contains('used')) return;

                // 🌟 點擊第一下：能量感應 (聚焦)
                if (focusedContainer !== container) {
                    if (focusedContainer) focusedContainer.classList.remove('focused');
                    container.classList.add('focused');
                    focusedContainer = container;
                    document.getElementById('instruction').innerHTML = "✨ <b style='color:var(--gold)'>感應到能量，再次點擊確認</b>";
                    
                    // 讓選中的牌自動置中
                    container.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                } 
                // 💥 點擊第二下：確認抽取 (觸發視覺欺騙特效)
                else {
                    container.classList.remove('focused');
                    container.classList.add('used');
                    container.style.opacity = '0'; // 隱藏下方卡片
                    container.style.pointerEvents = 'none';
                    
                    selectedCards.push(shuffled[i]);
                    const slot = document.getElementById(`slot-${drawnCount}`);
                    
                    // 注入卡片正面 HTML (包含 drop-in-anim 動畫)
                    slot.innerHTML = `
                        <div class="card-front drop-in-anim" style="width:100%; height:100%; border-radius:8px; background:#000; border: 1px solid var(--gold); color:var(--gold); display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:bold; box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.2);">
                            ${shuffled[i]}
                        </div>
                        <div style="position:absolute; bottom:-25px; width:100%; text-align:center; font-size:12px; color:var(--gold); font-weight:bold;">
                            ${["過去", "現在", "未來"][drawnCount]}
                        </div>
                    `;

                    // 觸發第一階段：瞬間爆發閃光 (Impact)
                    slot.classList.add('impact');
                    
                    // 觸發第二階段：爆發結束後，無縫接軌持續閃爍 (Shimmer)
                    setTimeout(() => {
                        slot.classList.remove('impact');
                        slot.classList.add('shimmering');
                    }, 400); // 對應 impact 動畫的 0.4s
                    
                    drawnCount++;
                    focusedContainer = null;
                    
                    // 更新指示文字
                    if (drawnCount < 3) {
                        document.getElementById('instruction').innerText = `請選擇第 ${drawnCount+1} 枚能量...`;
                    } else {
                        document.getElementById('instruction').innerHTML = "🔮 契合完成，請啟動解碼";
                        const submitBtn = document.getElementById('submitBtn');
                        submitBtn.classList.add('active'); // 按鈕出現並跳動
                        document.querySelector('.deck-wrapper').style.opacity = '0.3';
                        document.querySelector('.deck-wrapper').style.pointerEvents = 'none';
                    }
                }
            });
            deck.appendChild(container);
        }

        // ==========================================
        // 🔯 4. 結算與送出
        // ==========================================
        document.getElementById('submitBtn').addEventListener('click', () => {
            // 顯示蟲洞魔法陣轉場
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            // 組裝準備送給後端 Cloud Run 的隱藏指令
            const cmd = `[系統指令] 塔羅結算: [${currentTopic}] ${selectedCards.join(', ')}`;
            
            // 延遲 2.5 秒，確保使用者沉浸在魔法陣中
            setTimeout(() => {
                if (liff.isInClient()) {
                    liff.sendMessages([{ type: 'text', text: cmd }])
                        .then(() => liff.closeWindow())
                        .catch((err) => {
                            console.error('傳送訊息失敗', err);
                            alert("傳送失敗，請確認網路連線。");
                            document.getElementById('loadingOverlay').style.display = 'none';
                        });
                } else {
                    // 電腦瀏覽器除錯用
                    console.log(`即將送出指令: ${cmd}`);
                    alert("【測試模式】送出成功，請查看 Console。");
                    document.getElementById('loadingOverlay').style.display = 'none';
                }
            }, 2500);
        });
    </script>
</body>
</html>
