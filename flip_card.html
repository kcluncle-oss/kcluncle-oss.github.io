<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrandDecoder - 命運拱橋</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F9E498;
            --bg-deep: #050508;
            --card-w: 80px;
            --card-h: 128px;
            --radius: 500px; /* 完美扇形的半徑 */
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-deep);
            color: #fff; font-family: 'PingFang TC', 'Noto Serif TC', serif; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
            user-select: none; -webkit-user-select: none;
        }

        /* 🌌 4. 恢復銀河與流星畫布 */
        #space-canvas { position: fixed; inset: 0; z-index: -2; pointer-events: none; background: radial-gradient(circle at center, #0a0e29 0%, #020205 100%); }

        /* 大廳介面 */
        #lobby {
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 50; 
            background: rgba(5,5,8,0.9); transition: 0.5s;
        }
        #lobby.hidden { opacity: 0; pointer-events: none; transform: scale(1.05); }
        .lobby-title { color: var(--gold); font-size: 32px; font-weight: 900; letter-spacing: 6px; margin-bottom: 40px; text-shadow: 0 0 20px var(--gold); }
        .topic-btn {
            background: rgba(255, 255, 255, 0.05); border: 1.5px solid var(--gold); color: var(--gold-light); 
            width: 85%; max-width: 320px; padding: 20px; margin: 10px 0; border-radius: 50px; 
            font-size: 18px; font-weight: bold; letter-spacing: 3px; cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        #tarot-room { display: flex; flex-direction: column; height: 100%; opacity: 0; transition: 0.5s; }
        #tarot-room.active { opacity: 1; }

        /* 頂部 UI */
        .top-section {
            padding-top: 5vh; text-align: center; flex: 0 0 auto; z-index: 20;
            background: linear-gradient(to bottom, rgba(5,5,8,1) 40%, transparent);
        }
        .slots { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .slot {
            width: 75px; height: 120px; border: 1.5px dashed #555; border-radius: 8px;
            position: relative; transition: 0.4s; background-color: rgba(0,0,0,0.5);
            background-size: cover; background-position: center;
        }
        .slot-label { position: absolute; bottom: -25px; width: 100%; text-align: center; font-size: 12px; color: #888; letter-spacing: 2px;}

        /* ✨ 3. 恢復特效動畫 */
        @keyframes impact-flash {
            0% { box-shadow: 0 0 0px #fff; border-color: #555; }
            40% { box-shadow: 0 0 40px #fff, 0 0 60px var(--gold); border-color: #fff; background-color: rgba(255,255,255,0.8); }
            100% { box-shadow: 0 0 15px var(--gold); border-color: var(--gold); }
        }
        @keyframes drop-in-anim {
            0% { transform: translateY(-30px) scale(1.1); opacity: 0; }
            100% { transform: translateY(-50%) scale(1); opacity: 1; } /* Y軸-50%是為了置中 */
        }
        .slot.impact { animation: impact-flash 0.5s ease-out forwards; border-style: solid; }

        /* 🌉 2. 修正軸心：完美的拱橋幾何學 */
        .wheel-area {
            position: relative; flex: 1; width: 100%;
            overflow: hidden; touch-action: pan-y;
        }
        .bridge-container {
            position: absolute; left: 50%; 
            bottom: calc(var(--radius) * -1 + 40px); /* 將圓心定位在螢幕下方 */
            width: 0; height: 0; transform-style: preserve-3d;
            transition: transform 0.1s linear; cursor: grab;
        }
        .bridge-container:active { cursor: grabbing; }

        .card {
            position: absolute; width: var(--card-w); height: var(--card-h);
            left: calc(var(--card-w) / -2); 
            bottom: var(--radius); /* 卡片距離圓心的距離 */
            transform-origin: center calc(100% + var(--radius)); /* 旋轉支點精準設定在圓心 */
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            border-radius: 8px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            background-image: url('https://branddecoderai.com/images/PK_BG.jpg');
            background-size: cover; background-position: center; border: 1px solid rgba(212,175,55,0.4);
        }

        /* 🔢 1. 修正數字大小，防止遮擋 */
        .card-num {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 36px; /* 縮小至完美比例 */
            font-weight: 900; font-family: 'Times New Roman', serif;
            color: #F9E498; text-shadow: 0 0 10px rgba(0,0,0,0.9), 0 0 20px var(--gold);
            pointer-events: none;
        }

        .card.focused { transform: translateY(-40px) scale(1.15); border-color: #fff; box-shadow: 0 0 30px var(--gold); filter: brightness(1.2); z-index: 10; }

        .bottom-bar { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 30; pointer-events: none; }
        #submitBtn {
            background: var(--gold); color: #000; border: none; padding: 15px 45px; border-radius: 50px; font-weight: bold; font-size: 18px;
            opacity: 0; transform: translateY(20px); transition: 0.5s; box-shadow: 0 0 20px rgba(212,175,55,0.5); pointer-events: auto; display: none;
        }
        #submitBtn.active { opacity: 1; transform: translateY(0); display: block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 15px rgba(212,175,55,0.5); } 50% { box-shadow: 0 0 30px var(--gold); } }

        .front-text {
            color: #5C4033; font-size: 15px; font-weight: bold; text-align: center; width: 100%;
            position: absolute; top: 50%; transform: translateY(-50%); text-shadow: 0 0 5px rgba(255,255,255,0.8);
        }
        .drop-in { animation: drop-in-anim 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
    </style>
</head>
<body>
    <canvas id="space-canvas"></canvas>

    <div id="lobby">
        <div class="lobby-title">命運解碼室</div>
        <p style="color: #a0a0a0; margin-bottom: 30px; letter-spacing: 2px;">請凝神選擇欲指引的領域</p>
        <button class="topic-btn" data-topic="感情">💖 感情與糾葛</button>
        <button class="topic-btn" data-topic="事業">💼 事業與財富</button>
        <button class="topic-btn" data-topic="綜合">🌟 綜合與指引</button>
    </div>

    <div id="tarot-room">
        <div class="top-section">
            <div id="room-title" style="color:var(--gold); font-size: 1.2rem; font-weight: bold; letter-spacing: 3px;">專屬測算</div>
            <div id="instruction" style="font-size: 13px; color: #fff; margin-top: 8px;">左右滑動星盤，憑直覺感應您的牌</div>
            <div class="slots">
                <div class="slot" id="slot-0"><div class="slot-label">過去</div></div>
                <div class="slot" id="slot-1"><div class="slot-label">現在</div></div>
                <div class="slot" id="slot-2"><div class="slot-label">未來</div></div>
            </div>
        </div>

        <div class="wheel-area" id="wheel-wrapper">
            <div class="bridge-container" id="bridge"></div>
        </div>

        <div class="bottom-bar">
            <button id="submitBtn">解開命運結界</button>
        </div>
    </div>

    <script>
        // --- 4. 完整恢復宇宙粒子引擎 (Intensity 35, TL->BR) ---
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        function resizeCanvas() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        
        const INTENSITY = 35; 
        const FREQUENCY = 0.005; 
        const GALAXY_COLORS = ['rgba(138, 43, 226, OP)', 'rgba(212, 175, 55, OP)', 'rgba(65, 105, 225, OP)', 'rgba(255, 182, 193, OP)'];
        
        const stars = []; const galaxyParticles = []; const meteors = [];
        for(let i=0; i<150; i++) stars.push({x: Math.random()*width, y: Math.random()*height, r: Math.random()*1.5, a: Math.random()});
        
        const numGalaxy = Math.floor((INTENSITY / 100) * 1000); 
        for(let i=0; i<numGalaxy; i++) {
            const progress = Math.random();
            const spread = (Math.random()-0.5)*(Math.random()*300); 
            galaxyParticles.push({
                x: (progress*width) - spread, y: (progress*height) + spread, r: Math.random()*3+1,
                color: GALAXY_COLORS[Math.floor(Math.random()*GALAXY_COLORS.length)].replace('OP', Math.random()*0.5+0.1),
                vx: (Math.random()-0.5)*0.1, vy: (Math.random()-0.5)*0.1
            });
        }

        class Meteor {
            constructor() {
                this.x = Math.random() * (width / 2) - 100; this.y = -50;
                this.vx = Math.random() * 3 + 4; this.vy = this.vx * (height/width) * (0.8 + Math.random()*0.4); 
                this.life = 1; this.decay = Math.random() * 0.015 + 0.01;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw() {
                ctx.beginPath();
                const tailX = this.x - this.vx * 15; const tailY = this.y - this.vy * 15;
                const grad = ctx.createLinearGradient(this.x, this.y, tailX, tailY);
                grad.addColorStop(0, `rgba(255, 255, 255, ${this.life})`); grad.addColorStop(1, `rgba(212, 175, 55, 0)`);
                ctx.strokeStyle = grad; ctx.lineWidth = 2; ctx.moveTo(this.x, this.y); ctx.lineTo(tailX, tailY); ctx.stroke();
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI*2); ctx.fillStyle = `rgba(255, 255, 255, ${this.life})`; ctx.fill();
            }
        }

        function animateSpace() {
            ctx.clearRect(0,0,width,height); 
            ctx.fillStyle='#fff';
            stars.forEach(s => { s.a += (Math.random()-0.5)*0.1; if(s.a<0)s.a=0; if(s.a>1)s.a=1; ctx.globalAlpha=s.a; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); });
            ctx.globalAlpha=1;
            galaxyParticles.forEach(p => { p.x += p.vx; p.y += p.vy; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); });
            if(Math.random()<FREQUENCY) meteors.push(new Meteor());
            for(let i=meteors.length-1; i>=0; i--) { meteors[i].update(); meteors[i].draw(); if(meteors[i].life<=0) meteors.splice(i,1); }
            requestAnimationFrame(animateSpace);
        }
        animateSpace();

        // --- LIFF & 流程控制 ---
        const LIFF_ID = "2009490171-yQF5PguK"; // 替換為你的 LIFF ID
        liff.init({ liffId: LIFF_ID }).catch(err => console.error(err));

        let currentTopic = "";
        document.querySelectorAll('.topic-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentTopic = e.target.dataset.topic;
                document.getElementById('room-title').innerText = `【${currentTopic}】專屬測算`;
                document.getElementById('lobby').classList.add('hidden');
                document.getElementById('tarot-room').classList.add('active');
            });
        });

        // --- 拱橋邏輯 ---
        const bridge = document.getElementById('bridge');
        const wheelWrapper = document.getElementById('wheel-wrapper');
        const fullDeck = ["愚者", "魔術師", "女祭司", "女皇", "皇帝", "教皇", "戀人", "戰車", "力量", "隱士", "命運之輪", "正義", "倒吊人", "死神", "節制", "惡魔", "高塔", "星星", "月亮", "太陽", "審判", "世界", "權杖一", "權杖二", "權杖三", "權杖四", "權杖五", "權杖六", "權杖七", "權杖八", "權杖九", "權杖十", "權杖侍者", "權杖騎士", "權杖王后", "權杖國王", "聖杯一", "聖杯二", "聖杯三", "聖杯四", "聖杯五", "聖杯六", "聖杯七", "聖杯八", "聖杯九", "聖杯十", "聖杯侍者", "聖杯騎士", "聖杯王后", "聖杯國王", "寶劍一", "寶劍二", "寶劍三", "寶劍四", "寶劍五", "寶劍六", "寶劍七", "寶劍八", "寶劍九", "寶劍十", "寶劍侍者", "寶劍騎士", "寶劍王后", "寶劍國王", "錢幣一", "錢幣二", "錢幣三", "錢幣四", "錢幣五", "錢幣六", "錢幣七", "錢幣八", "錢幣九", "錢幣十", "錢幣侍者", "錢幣騎士", "錢幣王后", "錢幣國王"];
        const shuffled = fullDeck.sort(() => 0.5 - Math.random());

        let drawnCount = 0; let selectedCards = []; let focusedCard = null;
        let currentRotation = 0; let startX = 0; let isDragging = false; let hasDragged = false;

        const angleStep = 360 / 78;
        for (let i = 0; i < 78; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            const angle = i * angleStep;
            
            // 修正：依照半徑與圓心定位，避免偏移
            card.style.transform = `rotate(${angle}deg)`;
            card.dataset.angle = angle;
            card.innerHTML = `<div class="card-num">${i + 1}</div>`;

            card.addEventListener('click', () => {
                if (hasDragged || drawnCount >= 3 || card.classList.contains('used')) return;

                if (focusedCard !== card) {
                    if (focusedCard) focusedCard.style.transform = `rotate(${focusedCard.dataset.angle}deg)`;
                    focusedCard = card;
                    card.style.transform = `rotate(${angle}deg) translateY(-40px) scale(1.15)`;
                    
                    currentRotation = -angle;
                    bridge.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
                    bridge.style.transform = `rotate(${currentRotation}deg)`;
                    document.getElementById('instruction').innerHTML = `✨ 鎖定第 <b style='color:var(--gold)'>${i+1}</b> 號命運，再次點擊抽取`;
                } else {
                    card.classList.add('used'); card.style.opacity = '0'; card.style.pointerEvents = 'none';
                    selectedCards.push(shuffled[i]);
                    
                    const slot = document.getElementById(`slot-${drawnCount}`);
                    
                    // ✨ 3. 觸發閃爍特效與文字掉落
                    slot.classList.add('impact');
                    setTimeout(() => { slot.classList.remove('impact'); }, 500);
                    
                    slot.style.backgroundImage = "url('https://branddecoderai.com/images/PK_BG2.jpg')";
                    slot.style.border = "none";
                    slot.innerHTML += `<div class="front-text drop-in">${shuffled[i]}</div>`;
                    
                    drawnCount++;
                    focusedCard = null;
                    
                    if (drawnCount < 3) {
                        document.getElementById('instruction').innerText = `請滑動尋找第 ${drawnCount+1} 枚印記...`;
                    } else {
                        document.getElementById('instruction').innerHTML = "🔮 契合完成，請啟動解碼";
                        document.getElementById('submitBtn').classList.add('active');
                        wheelWrapper.style.opacity = '0.3'; wheelWrapper.style.pointerEvents = 'none';
                    }
                }
            });
            bridge.appendChild(card);
        }

        const startDrag = (x) => { isDragging = true; hasDragged = false; startX = x; bridge.style.transition = 'none'; };
        const onDrag = (x) => {
            if (!isDragging) return;
            const dx = x - startX; if (Math.abs(dx) > 3) hasDragged = true;
            currentRotation += dx * 0.15; bridge.style.transform = `rotate(${currentRotation}deg)`; startX = x;
        };
        const endDrag = () => { isDragging = false; };
        wheelWrapper.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX));
        wheelWrapper.addEventListener('touchmove', (e) => onDrag(e.touches[0].clientX));
        wheelWrapper.addEventListener('touchend', endDrag);

        document.getElementById('submitBtn').addEventListener('click', () => {
            const cmd = `[系統指令] 塔羅結算: [${currentTopic}] ${selectedCards.join(', ')}`;
            if (liff.isInClient()) {
                liff.sendMessages([{ type: 'text', text: cmd }]).then(() => liff.closeWindow());
            } else {
                alert("【測試】成功送出指令：" + cmd);
            }
        });
    </script>
</body>
</html>
