<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrandDecoder 專屬塔羅占卜</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #0B0C10; --card-bg: #1F2833; }
        body { background-color: var(--bg); color: white; margin: 0; font-family: 'Helvetica Neue', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding-top: 40px; }
        
        .header { text-align: center; color: var(--gold); letter-spacing: 2px; }
        .header h2 { margin: 0 0 5px 0; font-size: 20px; }
        .header p { margin: 0; font-size: 12px; color: #888; }

        .slots { display: flex; gap: 15px; z-index: 10; margin-top: 20px; }
        .slot { width: 85px; height: 140px; border: 1px dashed rgba(212, 175, 55, 0.4); border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); }
        .slot::after { content: attr(data-label); position: absolute; bottom: -25px; font-size: 12px; color: var(--gold); }

        .deck-area { position: relative; width: 100%; height: 35vh; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px; }
        .card { position: absolute; width: 70px; height: 115px; background: linear-gradient(135deg, #2C3E50, #000000); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 6px; cursor: pointer; transform-origin: center 250px; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .card::after { content: '✨'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.2; font-size: 24px; }
        
        /* 抽中狀態 (翻牌效果) */
        .card.selected { position: fixed; transform: rotateY(180deg) !important; width: 85px; height: 140px; background: #fff; border: 2px solid var(--gold); z-index: 100; cursor: default; }
        .card.selected .card-face { display: flex; transform: rotateY(180deg); }
        .card-face { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #000; font-weight: bold; font-size: 14px; text-align: center; padding: 5px; }

        .action-btn { position: absolute; bottom: 80px; background: linear-gradient(90deg, #D4AF37, #F3E5AB); color: #000; border: none; padding: 15px 40px; font-size: 16px; font-weight: bold; border-radius: 30px; cursor: pointer; display: none; z-index: 200; box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
    </style>
</head>
<body>

    <div class="header">
        <h2>BrandDecoder 塔羅占卜</h2>
        <p>請憑直覺，依序抽出三張牌</p>
    </div>

    <div class="slots">
        <div class="slot" id="slot-0" data-label="過去/核心"></div>
        <div class="slot" id="slot-1" data-label="現在/挑戰"></div>
        <div class="slot" id="slot-2" data-label="未來/建議"></div>
    </div>

    <button id="sendBtn" class="action-btn" onclick="sendResultToLine()">確認牌陣，解析命運</button>

    <div class="deck-area" id="deckFan"></div>

<script>
    // 1. 初始化 LIFF
    const LIFF_ID = "2009490171-yQF5PguK"; // ⚠️ 請換成你的 LIFF ID
    liff.init({ liffId: LIFF_ID }).then(() => {
        if (!liff.isLoggedIn()) liff.login();
    }).catch(err => console.error("LIFF Init failed", err));

    const majors = ["愚者", "魔術師", "女祭司", "女皇", "皇帝", "教皇", "戀人", "戰車", "力量", "隱士", "命運之輪", "正義", "倒吊人", "死神", "節制", "惡魔", "高塔", "星星", "月亮", "太陽", "審判", "世界"];
    const deckFan = document.getElementById('deckFan');
    const slots = [document.getElementById('slot-0'), document.getElementById('slot-1'), document.getElementById('slot-2')];
    let selectedCards = [];

    // 生成扇形牌堆 (簡化為 22 張大牌展示流暢度)
    const shuffled = [...majors].sort(() => Math.random() - 0.5);
    
    shuffled.forEach((name, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        const angle = (i - 11) * 4; // 扇形角度
        card.style.transform = `rotate(${angle}deg)`;
        card.style.zIndex = i;
        
        const face = document.createElement('div');
        face.className = 'card-face';
        face.innerHTML = `<span>🃏</span><br>${name}`;
        card.appendChild(face);
        
        card.onclick = () => selectCard(card, name);
        deckFan.appendChild(card);
    });

    function selectCard(cardEl, name) {
        if (selectedCards.length >= 3 || cardEl.classList.contains('selected')) return;

        const currentSlot = slots[selectedCards.length];
        const rect = currentSlot.getBoundingClientRect();
        
        selectedCards.push(name);
        
        cardEl.classList.add('selected');
        // 計算動畫飛往槽位的位置
        cardEl.style.left = `${rect.left}px`;
        cardEl.style.top = `${rect.top}px`;
        
        if (selectedCards.length === 3) {
            document.getElementById('sendBtn').style.display = 'block';
            deckFan.style.pointerEvents = 'none'; // 鎖定其他牌
        }
    }

    // 2. 傳送至 LINE 並自動關閉 (取代原本的複製貼上)
    async function sendResultToLine() {
        if (!liff.isInClient()) {
            alert("請在 LINE 聊天室中開啟此功能喔！\n(抽中：" + selectedCards.join(", ") + ")");
            return;
        }

        const btn = document.getElementById('sendBtn');
        btn.innerText = "正在傳送給命理師...";
        btn.disabled = true;

        // 組合特定的系統指令格式，讓你的 Cloud Run 攔截
        const messageText = `[系統指令] 塔羅結算: ${selectedCards.join(", ")}`;

        try {
            await liff.sendMessages([{ type: "text", text: messageText }]);
            // 發送成功後，自動關閉網頁
            liff.closeWindow(); 
        } catch (error) {
            alert("發送失敗，請重試：" + error);
            btn.innerText = "確認牌陣，解析命運";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
